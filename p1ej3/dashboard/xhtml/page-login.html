<!DOCTYPE html>
<html lang="es" class="h-100">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="keywords" content="" />
    <meta name="author" content="Andrei" />
    <meta name="robots" content="" />
    <meta name="description" content="Davur - Iniciar Sesión" />
    <meta property="og:title" content="Davur - Iniciar Sesión" />
    <meta property="og:description" content="Davur - Restaurant Bootstrap Admin Dashboard" />
    <meta name="format-detection" content="telephone=no">
    <title>Iniciar Sesión | Davur</title>

    <!-- Favicon icon -->
    <link rel="icon" type="image/png" sizes="16x16" href="./images/favicon.png">

    <!-- Davur Template CSS (incluye Bootstrap + Font Awesome via @import) -->
    <link href="./css/style.css" rel="stylesheet">

    <!-- Custom Login CSS -->
    <link href="./css/login-custom.css" rel="stylesheet">

</head>

<body class="h-100">

    <div class="authincation h-100">
        <div class="container h-100">
            <div class="row justify-content-center h-100 align-items-center">
                <div class="col-xl-12">
                    <div class="row align-items-center">
                        <div class="card login-card">
                            <div class="card-body p-0">
                                <div class="row g-0">

                                    <!-- ========================================
                                         PANEL IZQUIERDO - Ilustración
                                    ========================================= -->
                                    <div class="col-xl-6 col-lg-6 d-none d-lg-block">
                                        <div class="login-left-panel">
                                            <div class="login-left-content">
                                                <div class="text-center mb-4">
                                                    <a href="index.html">
                                                        <img src="images/logo-full.png" alt="Davur Logo" class="login-logo">
                                                    </a>
                                                </div>
                                                <div class="login-illustration">
                                                    <svg viewBox="0 0 500 400" xmlns="http://www.w3.org/2000/svg" class="w-100">
                                                        <defs>
                                                            <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
                                                                <stop offset="0%" style="stop-color:#2f4cdd;stop-opacity:0.1" />
                                                                <stop offset="100%" style="stop-color:#ff6746;stop-opacity:0.1" />
                                                            </linearGradient>
                                                        </defs>
                                                        <circle cx="250" cy="200" r="150" fill="url(#grad1)" />
                                                        <!-- Monitor -->
                                                        <rect x="150" y="80" width="200" height="140" rx="8" fill="#2f4cdd" opacity="0.9"/>
                                                        <rect x="158" y="88" width="184" height="115" rx="4" fill="#1a1e3a"/>
                                                        <rect x="175" y="108" width="60" height="6" rx="3" fill="#4c6fff" opacity="0.7"/>
                                                        <rect x="175" y="120" width="100" height="6" rx="3" fill="#ffffff" opacity="0.3"/>
                                                        <rect x="175" y="132" width="80" height="6" rx="3" fill="#ffffff" opacity="0.2"/>
                                                        <!-- Lock -->
                                                        <rect x="265" y="140" width="50" height="40" rx="6" fill="#ff6746" opacity="0.9"/>
                                                        <rect x="278" y="128" width="24" height="18" rx="12" fill="none" stroke="#ff6746" stroke-width="3"/>
                                                        <circle cx="290" cy="157" r="4" fill="#fff"/>
                                                        <rect x="288" y="160" width="4" height="8" rx="2" fill="#fff"/>
                                                        <!-- Base monitor -->
                                                        <rect x="225" y="220" width="50" height="8" rx="2" fill="#2f4cdd" opacity="0.7"/>
                                                        <rect x="215" y="228" width="70" height="6" rx="3" fill="#2f4cdd" opacity="0.5"/>
                                                        <!-- Persona -->
                                                        <circle cx="120" cy="240" r="25" fill="#ff6746" opacity="0.9"/>
                                                        <circle cx="120" cy="230" r="12" fill="#ffd5c8"/>
                                                        <ellipse cx="120" cy="265" rx="20" ry="25" fill="#2f4cdd" opacity="0.8"/>
                                                        <!-- Elementos flotantes animados -->
                                                        <circle cx="380" cy="120" r="15" fill="#ff6746" opacity="0.3">
                                                            <animate attributeName="cy" values="120;110;120" dur="3s" repeatCount="indefinite"/>
                                                        </circle>
                                                        <rect x="80" y="130" width="20" height="20" rx="4" fill="#2f4cdd" opacity="0.2" transform="rotate(15 90 140)">
                                                            <animate attributeName="y" values="130;120;130" dur="4s" repeatCount="indefinite"/>
                                                        </rect>
                                                        <circle cx="400" cy="250" r="8" fill="#2f4cdd" opacity="0.2">
                                                            <animate attributeName="cy" values="250;240;250" dur="2.5s" repeatCount="indefinite"/>
                                                        </circle>
                                                        <!-- Checkmark animado -->
                                                        <circle cx="370" cy="180" r="18" fill="#28a745" opacity="0.8">
                                                            <animate attributeName="r" values="18;20;18" dur="2s" repeatCount="indefinite"/>
                                                        </circle>
                                                        <polyline points="361,180 368,187 381,173" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
                                                        <text x="250" y="320" text-anchor="middle" font-family="Poppins,sans-serif" font-size="16" fill="#2f4cdd" opacity="0.6" font-weight="600">Acceso Seguro</text>
                                                        <text x="250" y="345" text-anchor="middle" font-family="Poppins,sans-serif" font-size="11" fill="#666" opacity="0.5">Tus datos están protegidos</text>
                                                    </svg>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    <!-- ========================================
                                         PANEL DERECHO - Formulario Login
                                    ========================================= -->
                                    <div class="col-xl-6 col-lg-6 col-md-12">
                                        <div class="auth-form">

                                            <!-- Logo solo visible en móvil -->
                                            <div class="text-center mb-4 d-lg-none">
                                                <a href="index.html">
                                                    <img src="images/logo-full.png" alt="Davur" style="max-width: 180px;">
                                                </a>
                                            </div>

                                            <h3 class="text-start mb-1 font-w600">Bienvenido de nuevo 👋</h3>
                                            <p class="text-muted mb-4">Ingresa tus credenciales para acceder al panel</p>

                                            <!-- ===== FORMULARIO ===== -->
                                            <form id="loginForm" novalidate>

                                                <!-- Email -->
                                                <div class="form-group mb-3">
                                                    <label class="mb-2 text-black fw-medium">
                                                        <i class="fas fa-envelope me-1 text-primary"></i>
                                                        Correo Electrónico
                                                        <span class="required">*</span>
                                                    </label>
                                                    <input type="email"
                                                           id="email"
                                                           name="email"
                                                           class="form-control"
                                                           placeholder="ejemplo@correo.com"
                                                           autocomplete="email"
                                                           required>
                                                    <div class="invalid-feedback" id="emailError"></div>
                                                </div>

                                                <!-- Contraseña -->
                                                <div class="form-group mb-3">
                                                    <label class="mb-2 text-black fw-medium">
                                                        <i class="fas fa-lock me-1 text-primary"></i>
                                                        Contraseña
                                                        <span class="required">*</span>
                                                    </label>
                                                    <div class="input-group">
                                                        <input type="password"
                                                               id="password"
                                                               name="password"
                                                               class="form-control"
                                                               placeholder="Ingresa tu contraseña"
                                                               autocomplete="current-password"
                                                               required>
                                                        <button class="btn btn-outline-secondary toggle-password" type="button"
                                                                title="Mostrar/Ocultar contraseña">
                                                            <i class="fas fa-eye" id="toggleIcon"></i>
                                                        </button>
                                                    </div>
                                                    <div class="invalid-feedback d-block" id="passwordError"></div>
                                                </div>

                                                <!-- Opciones -->
                                                <div class="form-row d-flex justify-content-between align-items-center mt-3 mb-3">
                                                    <div class="form-group mb-0">
                                                        <div class="form-check ms-1">
                                                            <input type="checkbox" class="form-check-input" id="rememberMe" name="remember">
                                                            <label class="form-check-label ms-1 text-muted" for="rememberMe">
                                                                Recordarme
                                                            </label>
                                                        </div>
                                                    </div>
                                                    <a href="./page-forgot-password.html" class="text-primary fw-medium small">
                                                        <i class="fas fa-unlock-alt me-1"></i>¿Olvidaste tu contraseña?
                                                    </a>
                                                </div>

                                                <!-- Alerta de respuesta del servidor -->
                                                <div id="alertContainer" class="mb-3" style="display: none;">
                                                    <div id="alertMessage" class="alert alert-dismissible fade show" role="alert">
                                                        <span id="alertText"></span>
                                                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                                                    </div>
                                                </div>

                                                <!-- Botón Submit -->
                                                <div class="text-center">
                                                    <button type="submit" id="btnLogin" class="btn btn-primary btn-block w-100">
                                                        <span class="btn-text">
                                                            <i class="fas fa-sign-in-alt me-2"></i>Iniciar Sesión
                                                        </span>
                                                        <span class="btn-loading" style="display: none;">
                                                            <span class="spinner-border spinner-border-sm me-2" role="status"></span>
                                                            Verificando...
                                                        </span>
                                                    </button>
                                                </div>
                                            </form>

                                            <!-- Separador -->
                                            <div class="login-divider my-4">
                                                <span>o continúa con</span>
                                            </div>

                                            <!-- Social Login -->
                                            <div class="row g-2 mb-3">
                                                <div class="col-6">
                                                    <button class="btn btn-outline-secondary w-100 btn-social" type="button">
                                                        <i class="fab fa-google me-2 text-danger"></i>Google
                                                    </button>
                                                </div>
                                                <div class="col-6">
                                                    <button class="btn btn-outline-secondary w-100 btn-social" type="button">
                                                        <i class="fab fa-facebook-f me-2 text-primary"></i>Facebook
                                                    </button>
                                                </div>
                                            </div>

                                            <!-- Registro -->
                                            <div class="new-account mt-3 text-center">
                                                <p class="mb-0 text-muted">
                                                    ¿No tienes una cuenta?
                                                    <a class="text-primary fw-bold" href="./page-register.html">Regístrate aquí</a>
                                                </p>
                                            </div>

                                        </div>
                                    </div>

                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>


    <!--**********************************
        Scripts
    ***********************************-->
    <!-- jQuery (incluido en global.min.js del template Davur) -->
    <script src="./vendor/global/global.min.js"></script>
    <!-- Bootstrap Select -->
    <script src="./vendor/bootstrap-select/dist/js/bootstrap-select.min.js"></script>
    <!-- Davur custom scripts -->
    <script src="./js/custom.min.js"></script>
    <script src="./js/deznav-init.js"></script>

    <!-- ★ Login - Validación jQuery + Ajax ★ -->
    <script src="./js/login.js"></script>

</body>
</html>
